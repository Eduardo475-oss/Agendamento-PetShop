<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento PetShop</title>
 
    <link rel="stylesheet" href="index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/svg" href="/assets/dog.svg"> 
</head>
<body>
    <div class="logo">
        <img src="assets/dog.svg">
        <h1 class="title">Mundo Pet</h1>
    </div>

    <main class="container">
        <form>
            <header>
                <div>
                    <h1>Sua agenda</h1>
                    <sub>Aqui você pode ver todos os clientes e serviços agendados para hoje.</sub>
                </div>
                
                <div class="date-wrapper">
                    <img src="/assets/Calendar-Minimalistic--Streamline-Solar.svg" alt="" class="calendar">
                    <input type="date" id="data" name="data">
                    <img src="assets/Icon2.svg" alt="" class="arrow-down">
                </div>
            </header>

            <div class="scheduled-sessions">
                <div id="morning" value="morning" class="morning-session">
                    <img src="/assets/Sun-Fog--Streamline-Solar.svg" alt="">
                    <h2>Manhã</h2>
                    <span>09h-12h</span>

                    <div id="morningschedule" data-id="1" data-period="morning" class="schedule">
                        <p class="time">09:00</p>
                        <p class="client">Thor/Fernanda Costa</p>
                        <p class="service">Vacinação</p>
                        <button class="btn-remove" data-id="1">Remove Agendamento</button>
                    </div>

                </div>

                <div id="afternoon" value="afternoon" class="afternoon-session">
                    <img src="/assets/Sun-Fog--Streamline-Solar.svg" alt="">
                    <h2>Manhã</h2>
                    <span>09h-12h</span>

                    <div id="afternoonschedule" data-id="2" data-period="afternoon" class="schedule">
                        <p class="time">13:00</p>
                        <p class="client">Mel/João Souza</p>
                        <p class="service">Corte de Unhas</p>
                        <button class="btn-remove" data-id="2">Remove Agendamento</button>
                    </div>

                </div>

                <div id="night" value="night" class="night-session">
                    <img src="/assets/Sun-Fog--Streamline-Solar.svg" alt="">
                    <h2>Manhã</h2>
                    <span>09h-12h</span>

                    <div id="nightschedule" data-id="3" data-period="night" class="schedule">
                        <p class="time">20:00</p>
                        <p class="client">Max/Camila Santos</p>
                        <p class="service">Limpeza de Dentes</p>
                        <button class="btn-remove" data-id="3">Remove Agendamento</button>
                    </div>

                </div>
            </div>
        </form>
    </main>

    <script src="main.js"></script>
</body>
</html>
